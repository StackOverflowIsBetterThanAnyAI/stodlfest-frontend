name: Full Accessibility Audit

on:
    push:
        branches:
            - master
    pull_request:
        branches:
            - master

permissions:
    contents: write

jobs:
    full-accessibility-audit:
        name: Full Accessibility Audit
        uses: StackOverflowIsBetterThanAnyAI/full-accessibility-audit/.github/workflows/full-accessibility-audit.yml@master
        with:
            app_port: "5173"
            start_command: "npx vite --port 5173 --host"
